<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Modal</title>
  <link rel="stylesheet" href="./styles/login-modal.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Modal is rendered open for demo purposes -->
  <div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <div class="login-modal">
      <button class="modal-close" type="button" aria-label="Close">×</button>

      <h2 id="loginTitle">Login to Continue</h2>
      <p class="modal-subtitle">Choose one secure login option.</p>

      <form id="loginForm" novalidate>
        <div class="name-input-group">
          <label class="field-label" for="loginName">Your Name</label>
          <input id="loginName" name="loginName" type="text" autocomplete="name" placeholder="Enter your name" required />
        </div>

        <div class="login-methods" role="group" aria-label="Login options">
          <!-- Google login option -->
          <button
            id="googleOption"
            class="method-card google-card"
            type="button"
            aria-pressed="false"
            data-client-id="517209799545-dtdrnpunls3uvte15oirf9rg5qrnlo1n.apps.googleusercontent.com"
          >
            <span class="method-title">Continue with Google</span>
            <span class="method-desc">Use your Google account for fast login.</span>
          </button>

          <!-- OTP login option -->
          <div id="otpOption" class="method-card otp-card">
            <label class="field-label" for="otpEmail">Login with Gmail OTP</label>
            <input
              id="otpEmail"
              name="otpEmail"
              type="email"
              autocomplete="email"
              placeholder="you@gmail.com"
            />
            <button id="sendOtpBtn" type="button" class="send-otp-btn">Send OTP</button>

            <label class="field-label" for="otp1">Enter OTP</label>
            <div class="otp-row" aria-label="OTP digits">
              <input class="otp-digit" id="otp1" type="text" inputmode="numeric" maxlength="1" />
              <input class="otp-digit" id="otp2" type="text" inputmode="numeric" maxlength="1" />
              <input class="otp-digit" id="otp3" type="text" inputmode="numeric" maxlength="1" />
              <input class="otp-digit" id="otp4" type="text" inputmode="numeric" maxlength="1" />
            </div>
          </div>
        </div>

        <p id="modeHint" class="mode-hint">Select one login method to continue.</p>
        <p id="formError" class="form-error" aria-live="polite"></p>
        <p id="formSuccess" class="form-success" aria-live="polite"></p>

        <button id="loginSubmit" class="submit-btn" type="submit">Login</button>
      </form>
    </div>
  </div>

  <script src="./js/login-modal.js"></script>
</body>
</html>
