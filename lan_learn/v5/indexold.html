<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        body, h1, p, a {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #b2fefa 0%, #e0ffea 100%);
            /* #b2fefa is a light blue, #e0ffea is a light green */
              /* #b2fefa is a light blue, #e0ffea is a light green */
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: #333;
            font-size: 2.8rem;
            margin-bottom: 24px;
            letter-spacing: 2px;
            text-shadow: 1px 2px 8px #fff9;
        }
        p {
            margin: 12px 0;
        }
        a {
            display: inline-block;
            padding: 12px 28px;
            margin: 8px 8px 0 0;
            background: linear-gradient(90deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow: 0 2px 8px #0001;
            transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
        }
        a:hover {
            background: linear-gradient(90deg, #e0ffea 0%, #b2fefa 100%);
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 6px 16px #0002;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            a {
                font-size: 1rem;
                padding: 10px 18px;
            }
        }
    </style>
</head>
