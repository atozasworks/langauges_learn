<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Language Editor</title>
  <link rel="stylesheet" href="style.css">
  <script src="jsapi.js"></script>
  <script src="transliterationI.js"></script>
</head>
<body>
  <div class="apps">
    <div class="app-container">
      <h2 class="slogan">"Write in Any Language, Express in Every Script"</h2>
      <h3 class="slogan1">"Because communication has no alphabet."</h3>
      <div id="dropdown-root"></div>
        <select id="languageSelector" style="display:none;"></select>
      <div class="toolbar">
        <label>Document Name: </label>
        <input type="text" id="fileName" value="Untitled Document" placeholder="Enter document name" />
        <label>Page Size: </label>
        <select id="pageSizeSelector"></select>
        <label>Orientation: </label>
        <select id="orientationSelector">
          <option value="portrait">Portrait</option>
          <option value="landscape">Landscape</option>
        </select>
        <label>Font Size: </label>
        <select id="fontSizeSelector">
          <option value="12px">12px</option>
          <option value="14px">14px</option>
          <option value="16px">16px</option>
          <option value="18px">18px</option>
          <option value="20px">20px</option>
          <option value="24px">24px</option>
          <option value="28px">28px</option>
          <option value="32px">32px</option>
          <option value="36px">36px</option>
          <option value="40px">40px</option>
        </select>
        
        <button id="saveBtn" class="icon-button" title="Save Document">Save</button>
        <button id="printBtn" class="icon-button" title="Print Document">Print</button>

        <div class="text-toolbar">
          <select id="fontFamilySelector" class="ql-font"></select>
          <select id="textStyleSelector" class="ql-header">
            <option value="" selected>Normal</option>
            <option value="1">Header 1</option>
            <option value="2">Header 2</option>
            <option value="3">Header 3</option>
            <option value="4">Header 4</option>
            <option value="5">Header 5</option>
            <option value="6">Header 6</option>
          </select>
          <span class="ql-formats">
            <button class="ql-bold" title="Bold"></button>
            <button class="ql-italic" title="Italic"></button>
            <button class="ql-underline" title="Underline"></button>
            <button class="ql-strike" title="Strikethrough"></button>
            <button class="ql-link" title="Link"></button>
            <button class="ql-image" title="Image"></button>
            <button class="ql-script" value="sub" title="Subscript"></button>
            <button class="ql-script" value="super" title="Superscript"></button>
          </span>
          <input type="file" id="imageUploadInput" accept="image/*" style="display:none;">
          <span class="ql-formats">
            <button class="ql-list" value="ordered" title="Ordered List"></button>
            <button class="ql-list" value="bullet" title="Unordered List"></button>
            <button class="ql-list" value="check" title="Checklist"></button>
            <button class="ql-indent" value="-1" title="Decrease Indent"></button>
            <button class="ql-indent" value="+1" title="Increase Indent"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-align" value="" title="Align Left"></button>
            <button class="ql-align" value="center" title="Align Center"></button>
            <button class="ql-align" value="right" title="Align Right"></button>
            <button class="ql-align" value="justify" title="Align Justify"></button>
          </span>
          <span class="ql-formats">
            <input type="color" class="ql-color" value="#000000" title="Text Color">
            <button class="ql-clean" title="Clear Formatting"></button>
          </span>
        </div>
      </div>
      <div class="editor-container">
      <div class="document-wrapper">
        <div id="editor" contenteditable="true" class="ql-editor"></div>
      </div>
      </div>
    </div>
  </div>
  <script src="languages.js"></script>
  <script src="transliteration_enabled_languages.js"></script>
  <script src="app.js"></script>
</body>
</html>
